[project]
site_name = "FGA Preview - Fate/Grand Automata Fork"
site_url = "https://arthurkun21.github.io/FGA-Preview-Build/"
site_description = "FGA Preview is an enhanced fork of Fate/Grand Automata (FGA) for Android. Features auto-leveling skills, CE, servants, append skills, NP detection, and automated farming scripts for FGO."
site_author = "ArthurKun21"
repo_name = "FGA Preview"
repo_url = "https://github.com/ArthurKun21/fga-preview-build"
edit_uri = "edit/main/docs"
copyright = "Copyright &copy; 2024 - 2025 ArthurKun21"
docs_dir = "docs"
site_dir = "site"
use_directory_urls = true

extra_css = ["stylesheets/extra.css"]

nav = [
  { "Home" = "index.md" },
  { "Posts" = ["post/auto-level-ce-and-ce-exp-bomb.md", "post/grand-duels.md", "post/install-via-obtanium.md"] },
  { "App" = ["app/requirements.md", { "Settings" = ["app/appearance.md", "app/global-battle.md", "app/storage.md", "app/advanced.md"] }, "app/fine-tune.md", "app/library.md"] },
  { "Auto Battle" = [{ "Configuration" = ["battle-setup/config.md", "battle-setup/card-priority.md", "battle-setup/materials.md", "battle-setup/skill-maker.md", "battle-setup/support.md"] }, { "How to get started" = ["battle-setup/launcher.md"] }, { "In-battle" = ["in-battle/auto-battle.md", { "Card Selection" = ["in-battle/card-selection/face-card-priority.md", "in-battle/card-selection/brave-chains.md", "in-battle/card-selection/shuffle-cards.md"] }, { "Skill System" = ["in-battle/skill-system/skill-execution.md", "in-battle/skill-system/auto-target.md"] }, { "Tracking" = ["in-battle/tracking/stage-tracking.md", "in-battle/tracking/servant-tracking.md", "in-battle/tracking/materials-tracking.md", "in-battle/tracking/ce-drops.md"] }, { "Resources" = ["in-battle/resources/energy-refill.md", "in-battle/resources/teapots.md"] }, { "Script Control" = ["in-battle/script-control/party-selection.md", "in-battle/script-control/withdraw.md", "in-battle/script-control/auto-battle-exit-reasons.md", "in-battle/script-control/screen-detection.md"] }] }, { "Support screen" = ["support-screen/class-picker.md", "support-screen/refresh.md", "support-screen/selection-modes.md", { "Preferred Support" = ["support-screen/preferred-servant.md", "support-screen/preferred-ce.md", "support-screen/preferred-friend.md", "support-screen/grand-servant.md"] }] }] },
  "scripts/auto-level-servant.md",
  "scripts/auto-level-ce.md",
  "scripts/auto-ce-exp-bomb.md",
  "scripts/auto-level-skills.md",
  "scripts/auto-level-append.md",
  { "Other Scripts" = ["other-scripts/friend-point-gacha.md", "other-scripts/gift-box.md", "other-scripts/lottery.md", "other-scripts/play-button-detection.md", "other-scripts/support-image-maker.md"] },
  { "Changelog" = ["changelog/pre-2509.md", "changelog/pre-2508.md", "changelog/pre-2489.md", "changelog/pre-2463.md", "changelog/pre-2304.md", "changelog/pre-2292.md", "changelog/pre-2288.md", "changelog/pre-2278.md", "changelog/pre-2273.md", "changelog/pre-2267.md", "changelog/pre-2263.md", "changelog/pre-2262.md", "changelog/pre-2253.md", "changelog/pre-2252.md", "changelog/pre-2249.md", "changelog/pre-2245.md", "changelog/pre-2208.md", "changelog/pre-2186.md", "changelog/pre-2178.md", "changelog/pre-2163.md", "changelog/pre-2152.md", "changelog/pre-2148.md", "changelog/pre-2146.md", "changelog/pre-2138.md", "changelog/pre-2133.md", "changelog/pre-2126.md", "changelog/pre-2124.md", "changelog/pre-2120.md", "changelog/pre-2116.md", "changelog/pre-2106.md", "changelog/pre-2100.md", "changelog/pre-2098.md", "changelog/pre-2095.md", "changelog/pre-2092.md", "changelog/pre-2090.md", "changelog/pre-2085.md", "changelog/pre-2079.md", "changelog/pre-2075.md", "changelog/pre-2074.md", "changelog/pre-2061.md"] },
]

[project.extra]
generator = false

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/ArthurKun21/fga-preview-build"
name = "FGA Preview on GitHub"

[[project.extra.social]]
icon = "fontawesome/solid/mug-hot"
link = "https://ko-fi.com/arthurkun21"
name = "Support on Ko-fi"

[project.theme]
variant = "classic"
custom_dir = "docs/overrides"
logo = "assets/icon.png"
favicon = "assets/icon.ico"
language = "en"
features = [
  "navigation.tabs",
  "navigation.tabs.sticky",
  "navigation.top",
  "navigation.footer",
  "navigation.sections",
  "navigation.expand",
  "toc.follow",
  "search.suggest",
  "search.share",
  "search.highlight",
  "content.action.edit",
  "content.action.view",
  "content.code.copy",
]

[[project.theme.palette]]
scheme = "default"
primary = "red"

[project.theme.palette.toggle]
icon = "lucide/sun"
name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "red"

[project.theme.palette.toggle]
icon = "lucide/moon"
name = "Switch to light mode"

[project.plugins.search]
lang = ["en"]
separator = "[\\s\\-\\.]+"

[project.plugins.tags]

[project.plugins.meta]

[project.markdown_extensions.admonition]

[project.markdown_extensions.def_list]

[project.markdown_extensions.toc]
permalink = true
title = "On this page"
toc_depth = 3

[project.markdown_extensions.footnotes]

[project.markdown_extensions.tables]

[project.markdown_extensions.attr_list]

[project.markdown_extensions.md_in_html]

[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]

[project.markdown_extensions.pymdownx.betterem]

[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true

[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = false
line_spans = "__span"
pygments_lang_class = true

[project.markdown_extensions.pymdownx.inlinehilite]

[project.markdown_extensions.pymdownx.snippets]

[project.markdown_extensions.pymdownx.mark]

[project.markdown_extensions.pymdownx.keys]