name: Publish Docs
on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - '.python-version'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'zensical.toml'
      - 'scripts/generate_zensical_config.py'
      - '.github/workflows/docs.yml'
  pull_request:
    branches:
      - docs/**
    paths:
      - 'docs/**'
      - '.python-version'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'zensical.toml'
      - 'scripts/generate_zensical_config.py'
      - '.github/workflows/docs.yml'
  # Manual triggers
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/configure-pages@v5

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: '3.14'
          enable-cache: true
          cache-python: true

      - name: Sync locked dependencies
        run: uv sync --locked

      - name: Generate Zensical config
        run: uv run python scripts/generate_zensical_config.py

      - name: Build documentation site
        run: uv run zensical build --clean --config-file zensical.toml

      - uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy-docs:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: build-docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
